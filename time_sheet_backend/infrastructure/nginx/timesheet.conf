# Nginx reverse proxy for TimeSheet Supabase + PowerSync
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.timesheet.staticflow.ch studio.timesheet.staticflow.ch sync.timesheet.staticflow.ch timesheet.staticflow.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Supabase API (Kong Gateway)
server {
    listen 443 ssl http2;
    server_name api.timesheet.staticflow.ch;

    ssl_certificate /etc/letsencrypt/live/timesheet.staticflow.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timesheet.staticflow.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }
}

# Supabase Studio (Admin Dashboard)
server {
    listen 443 ssl http2;
    server_name studio.timesheet.staticflow.ch;

    ssl_certificate /etc/letsencrypt/live/timesheet.staticflow.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timesheet.staticflow.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Restrict access to studio (optional: add IP whitelist)
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# PowerSync Service
server {
    listen 443 ssl http2;
    server_name sync.timesheet.staticflow.ch;

    ssl_certificate /etc/letsencrypt/live/timesheet.staticflow.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timesheet.staticflow.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for sync
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }
}

# React Web App (Docker container)
server {
    listen 443 ssl http2;
    server_name timesheet.staticflow.ch;

    ssl_certificate /etc/letsencrypt/live/timesheet.staticflow.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timesheet.staticflow.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
