version: "3.8"

# ==============================================
# DEV ENVIRONMENT - Lightweight Supabase + PowerSync
# Excluded: Studio, meta, functions, DocuSeal
# ==============================================

services:
  # ============================================
  # SUPABASE SERVICES (DEV)
  # ============================================

  dev-db:
    image: supabase/postgres:15.6.1.143
    container_name: timesheet-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - dev-db-data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d
    networks:
      - dev-supabase-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev-auth:
    image: supabase/gotrue:v2.164.0
    container_name: timesheet-dev-auth
    restart: unless-stopped
    depends_on:
      dev-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dev-db:5432/${POSTGRES_DB}?search_path=auth
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM}
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST}
      GOTRUE_SMTP_PORT: ${GOTRUE_SMTP_PORT}
      GOTRUE_SMTP_USER: ${GOTRUE_SMTP_USER}
      GOTRUE_SMTP_PASS: ${GOTRUE_SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${GOTRUE_SMTP_SENDER_NAME}
      GOTRUE_SMTP_ADMIN_EMAIL: ${GOTRUE_SMTP_ADMIN_EMAIL}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI}
    networks:
      - dev-supabase-net

  dev-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: timesheet-dev-rest
    restart: unless-stopped
    depends_on:
      dev-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dev-db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - dev-supabase-net

  dev-realtime:
    image: supabase/realtime:v2.33.58
    container_name: timesheet-dev-realtime
    restart: unless-stopped
    depends_on:
      dev-db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: dev-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: DevSecretKeyBaseAtLeast64CharsLongForSecurityPurposesReplace123
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
    networks:
      - dev-supabase-net

  dev-storage:
    image: supabase/storage-api:v1.11.13
    container_name: timesheet-dev-storage
    restart: unless-stopped
    depends_on:
      dev-db:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://dev-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dev-db:5432/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
    volumes:
      - dev-storage-data:/var/lib/storage
    networks:
      - dev-supabase-net

  dev-imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: timesheet-dev-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
    volumes:
      - dev-storage-data:/var/lib/storage
    networks:
      - dev-supabase-net

  # ============================================
  # EDGE FUNCTIONS (Deno runtime)
  # ============================================

  dev-functions:
    image: supabase/edge-runtime:v1.65.3
    container_name: timesheet-dev-functions
    restart: unless-stopped
    depends_on:
      dev-db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://dev-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dev-db:5432/${POSTGRES_DB}
      VERIFY_JWT: "true"
    volumes:
      - ./supabase/functions:/home/deno/functions:Z
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    networks:
      - dev-supabase-net

  dev-kong:
    image: kong:2.8.1
    container_name: timesheet-dev-kong
    restart: unless-stopped
    depends_on:
      - dev-auth
      - dev-rest
      - dev-realtime
      - dev-storage
      - dev-functions
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - dev-supabase-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.dev-supabase.rule=Host(`dev-supabase.timesheet.staticflow.ch`)"
      - "traefik.http.routers.dev-supabase.entrypoints=websecure"
      - "traefik.http.routers.dev-supabase.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dev-supabase.service=dev-supabase"
      - "traefik.http.services.dev-supabase.loadbalancer.server.port=8000"
      # HTTP redirect
      - "traefik.http.routers.dev-supabase-http.rule=Host(`dev-supabase.timesheet.staticflow.ch`)"
      - "traefik.http.routers.dev-supabase-http.entrypoints=web"
      - "traefik.http.routers.dev-supabase-http.middlewares=redirect-to-https@docker"
      # WebSocket support for Realtime
      - "traefik.http.middlewares.dev-supabase-headers.headers.customrequestheaders.X-Forwarded-Proto=https"

  # ============================================
  # POWERSYNC (DEV)
  # ============================================

  dev-mongo:
    image: mongo:7.0
    container_name: timesheet-dev-mongo
    restart: unless-stopped
    volumes:
      - dev-mongo-data:/data/db
    networks:
      - dev-supabase-net
    command: mongod --replSet rs0 --bind_ip_all

  dev-mongo-init:
    image: mongo:7.0
    container_name: timesheet-dev-mongo-init
    depends_on:
      - dev-mongo
    entrypoint: >
      mongosh --host dev-mongo:27017 --eval "
        try { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'dev-mongo:27017' }] }) }
        catch(e) { if (e.codeName !== 'AlreadyInitialized') throw e; }
      "
    networks:
      - dev-supabase-net
    restart: "no"

  dev-powersync:
    image: journeyapps/powersync-service:latest
    container_name: timesheet-dev-powersync
    restart: unless-stopped
    depends_on:
      dev-db:
        condition: service_healthy
      dev-mongo:
        condition: service_started
    command: ["start", "-c", "/powersync-config/powersync.yaml"]
    environment:
      # Override env vars used in powersync.yaml
      POWERSYNC_DB_USER: ${POSTGRES_USER}
      POWERSYNC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      POWERSYNC_DB_HOST: dev-db
      POWERSYNC_DB_PORT: "5432"
      POWERSYNC_DB_NAME: ${POSTGRES_DB}
      POWERSYNC_JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./powersync/powersync.yaml:/powersync-config/powersync.yaml:ro
    networks:
      - dev-supabase-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.dev-powersync.rule=Host(`dev-powersync.timesheet.staticflow.ch`)"
      - "traefik.http.routers.dev-powersync.entrypoints=websecure"
      - "traefik.http.routers.dev-powersync.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dev-powersync.service=dev-powersync"
      - "traefik.http.services.dev-powersync.loadbalancer.server.port=8080"
      # HTTP redirect
      - "traefik.http.routers.dev-powersync-http.rule=Host(`dev-powersync.timesheet.staticflow.ch`)"
      - "traefik.http.routers.dev-powersync-http.entrypoints=web"
      - "traefik.http.routers.dev-powersync-http.middlewares=redirect-to-https@docker"

networks:
  dev-supabase-net:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  dev-db-data:
    driver: local
  dev-storage-data:
    driver: local
  dev-mongo-data:
    driver: local
